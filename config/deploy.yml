# Name of your application. Used to uniquely configure containers.
service: rails_yeah

# Name of the container image (Docker Hub: sprintvibe/rails_yeah).
image: sprintvibe/rails_yeah

# Deploy to these servers.
servers:
  web:
    - 165.227.217.174

# Enable SSL auto certification via Let's Encrypt. The DNS A record for `host`
# must point at the server before the first deploy so the cert can be issued.
proxy:
  ssl: true
  host: railsyeah.com

# Credentials for your image host (Docker Hub). Password is the access token,
# read from .kamal/secrets (which cats .kamal/registry_password).
registry:
  username: sprintvibe
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    SOLID_QUEUE_IN_PUMA: true

    # Conservative concurrency for the 2 GB droplet + 22-connection managed Postgres.
    # One Puma worker, 3 threads keeps us comfortably under the DB connection limit.
    WEB_CONCURRENCY: 1
    RAILS_MAX_THREADS: 3

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Persistent volume — kept as a fallback; production media lives in DigitalOcean
# Spaces (config/storage.yml), so this stays effectively unused.
volumes:
  - "rails_yeah_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
